version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financetracker-sql
    environment:
      SA_PASSWORD: "Your_strong_password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $${SA_PASSWORD} -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - sql_data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    container_name: financetracker-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: financetracker-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  api:
    build:
      context: .                         # build from repo root
      dockerfile: docker/api.Dockerfile  # use our API Dockerfile
    container_name: myapp-api
    ports:
      - "5000:8080"    # localhost:5000 → container:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped
    networks:
      - myapp-network

  blazor:
    build:
      context: .
      dockerfile: docker/blazor.Dockerfile
    container_name: myapp-blazor
    ports:
      - "3000:80"     # localhost:3000 → container:80
    depends_on:
      - api            # blazor starts AFTER api
    restart: unless-stopped
    networks:
      - myapp-network

networks:
  myapp-network:
    driver: bridge

volumes:
  sql_data:

